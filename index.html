<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Keyboard Warrior</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #f0f4f8;
  padding: 20px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
}

/* ══════════════════════════════════════
   GAME PANEL
══════════════════════════════════════ */
#gameContainer {
  display: flex;
  flex-direction: column;
  align-items: stretch;
  width: 100%;
  max-width: 900px;
  background: #e0f2fe;
  border-radius: 16px;
  padding: 6px 24px 24px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}
.topRow {
  display: flex;
  align-items: center;
  gap: 16px;
  min-height: 90px;
}
.leftPanel {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 6px;
  flex-shrink: 0;
  width: 140px;
}
.middlePanel {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 20px;
}
.rightPanel {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
  width: 130px;
  justify-content: center;
}

/* ══════════════════════════════════════
   BUTTONS
══════════════════════════════════════ */
#mainBtn, #helpBtn {
  width: 130px;
  height: 32px;
  border: none;
  outline: none;
  border-radius: 16px;
  font-weight: 600;
  cursor: pointer;
  font-size: 14px;
  text-align: center;
  padding: 0 16px;
  box-shadow: none;
  -webkit-appearance: none;
  appearance: none;
}
#mainBtn:focus, #helpBtn:focus { outline: none; box-shadow: none; }
#mainBtn { background: #10b981; color: white; }
#mainBtn:hover { background: #059669; }
#helpBtn { background: #6b7280; color: white; font-size: 12px; transition: background 0.8s ease; }
#helpBtn:hover { background: #4b5563; }
#helpBtn:active { background: #9ca3af; transition: background 0s; }

/* ══════════════════════════════════════
   TIMER
══════════════════════════════════════ */
.timerBox {
  background: #1f2937;
  color: white;
  border-radius: 50%;
  width: 130px;
  height: 130px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
  padding: 0;
  transition: background 0.2s ease;
  cursor: default;
  overflow: hidden;
  flex-shrink: 0;
}
/* Each half occupies exactly 50% so the divider always lands at centre */
.timerBox .timer-top,
.timerBox .timer-bottom {
  flex: 1;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
/* Top: number sits closest to divider (flex-end), icon floats up */
.timerBox .timer-top    { justify-content: flex-end;   padding-bottom: 5px; }
/* Bottom: number sits closest to divider (flex-start), icon floats down */
.timerBox .timer-bottom { justify-content: flex-start;  padding-top: 5px; }
.timerBox .timer-icon {
  width: 14px;
  height: 14px;
  opacity: 0.55;
}
.timerBox .accuracy-icon {
  width: 14px;
  height: 14px;
  opacity: 0.55;
}
.timerBox .timer-time {
  font-size: 26px;
  font-weight: 700;
  font-family: 'Courier New', monospace;
  letter-spacing: 1px;
  line-height: 1;
}
/* SVG dashed divider — zero flex-shrink so it never collapses */
.timerBox .timer-divider {
  display: block;
  width: 100%;
  flex-shrink: 0;
  overflow: visible;
}
/* Accuracy number */
.timerBox .timer-accuracy {
  font-size: 26px;
  font-weight: 700;
  font-family: 'Courier New', monospace;
  letter-spacing: 1px;
  line-height: 1;
}

/* CHANGE 5: paused timer is clickable to unpause */
.timerBox.paused        { background: #4b5563; cursor: pointer; }
.timerBox.green         { background: #10b981; }
.timerBox.finished      { background: #1f2937; }
/* Penalty gradients — sharp split at 50%, rapid transition in */
.timerBox.penalty-time  {
  background: linear-gradient(to bottom, #ef4444 0%, #ef4444 50%, #1f2937 50%, #1f2937 100%);
  transition: background 0.08s ease;
}
.timerBox.penalty-acc   {
  background: linear-gradient(to bottom, #1f2937 0%, #1f2937 50%, #f59e0b 50%, #f59e0b 100%);
  transition: background 0.08s ease;
}

/* ══════════════════════════════════════
   TITLE
══════════════════════════════════════ */
#title {
  font-size: 24px;
  font-weight: 600;
  text-align: center;
  line-height: 1.3;
  color: #1f2937;
  opacity: 1;
  transition: opacity 0.3s, filter 0.4s;
  filter: none;
  white-space: pre-line;
}
#title.hidden  { opacity: 0; }
#title.strike  { text-decoration: line-through; opacity: 0.45; }
#title.blurred { filter: blur(8px); opacity: 0.6; user-select: none; }

/* ══════════════════════════════════════
   INFO ROWS (question count + best record)
══════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap');

#questionRow {
  width: 100%;
  max-width: 900px;
  text-align: center;
  font-family: 'Lato', system-ui, sans-serif;
  font-size: 16px;
  color: #6b7280;
  min-height: 20px;
  padding: 0 24px 2px;
  transition: opacity 0.4s ease;
}
/* Stats row: mirrors leftPanel/rightPanel widths, sits under game panel */
#statsRow {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  max-width: 900px;
  padding: 8px 24px 10px;
  position: relative;
  box-sizing: border-box;
  min-height: 37px;
}
#statLeft, #statRight {
  font-family: 'Lato', system-ui, sans-serif;
  font-size: 13px;
  color: #6b7280;
  white-space: nowrap;
}
#statLeft  { width: 130px; text-align: center; }
#statRight { width: 130px; text-align: center; }

#credit {
  font-family: 'Lato', system-ui, sans-serif;
  font-size: 12px;
  color: #9ca3af;
  text-align: center;
  max-width: 900px;
  width: 100%;
  padding: 8px 24px 0;
}

/* Extended key ghost pill — appears in statsRow when a key not on the
   graphical keyboard is held. Styled to match the current keyboard mode. */
#extKeyPill {
  position: absolute;
  left: 50%;
  transform: translate(-50%, -50%);
  top: 50%;
  background: #f5f5f7;
  color: #1d1d1f;
  font-family: system-ui, sans-serif;
  font-size: 11px;
  font-weight: 500;
  padding: 0 14px;
  height: 32px;
  min-width: 48px;
  display: none;
  align-items: center;
  justify-content: center;
  border-radius: 4px;           /* Mac style by default */
  box-shadow: 0 2px 0 #8a9099, inset 0 -1px 0 rgba(0,0,0,0.08);
  pointer-events: none;
  z-index: 11;
  transition: background 0.07s, box-shadow 0.07s, color 0.07s;
  white-space: nowrap;
}
/* PC mode: circular/pill */
body.pc-mode #extKeyPill {
  border-radius: 40px;
}
/* Lit states mirror real keys */
#extKeyPill.lit-green {
  background: #10b981 !important;
  box-shadow: 0 2px 0 #059669, 0 0 8px rgba(16,185,129,0.5) !important;
  color: white !important;
}
#extKeyPill.lit-orange {
  background: #f97316 !important;
  box-shadow: 0 2px 0 #c2410c, 0 0 8px rgba(249,115,22,0.5) !important;
  color: white !important;
}
#extKeyPill.lit-fading {
  transition: background 0.8s ease, box-shadow 0.8s ease, color 0.8s ease !important;
}

/* Toast pill — centred over the stats row, overlaps if needed */
#kbToast {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  background: #f59e0b;
  color: white;
  font-size: 12px;
  font-weight: 600;
  padding: 5px 14px;
  border-radius: 12px;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 10;
  top: 50%;
  transform: translate(-50%, -50%);
}
#kbToast.show { opacity: 1; }

/* ══════════════════════════════════════
   KEYBOARD WRAPPER
══════════════════════════════════════ */
#keyboardWrap {
  display: flex;
  justify-content: center;
  width: 100%;
  margin-top: 4px;
}

/* ══════════════════════════════════════
   KEYBOARD PANEL
   Outer: 14px → corner keys: 9px → base keys: 4px
══════════════════════════════════════ */
#keyboardPanel {
  background: #b2b8c0;
  border-radius: 14px;
  padding: 9px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.18);
  display: inline-flex;
  flex-direction: column;
  gap: 4px;
}
.kb-row {
  display: flex;
  gap: 4px;
}

/* Base key */
.key {
  background: #f5f5f7;
  border-radius: 4px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #1d1d1f;
  font-family: system-ui, sans-serif;
  box-shadow: 0 1px 0 #8a9099, inset 0 -1px 0 rgba(0,0,0,0.08);
  user-select: none;
  position: relative;
  transition: background 0.07s;
  width: 40px;
  height: 40px;
  flex-shrink: 0;
  cursor: default;
}
.key.corner-tl { border-top-left-radius: 9px; }
.key.corner-tr { border-top-right-radius: 9px; }
.key.corner-bl { border-bottom-left-radius: 9px; }
.key.corner-br { border-bottom-right-radius: 9px; }

/* Keys that sit one step in from a panel corner get a mid-level radius.
   Panel = 14px, true corner keys = 9px, these edge-adjacent keys = 6px. */
/* ~` key: top-left */
#keyboardPanel [data-key="Backquote"]  { border-top-left-radius: 6px; }
/* delete key: top-right */
#keyboardPanel [data-key="Backspace"]  { border-top-right-radius: 6px; }
/* shift keys: all corners standard 4px — no overrides needed */
/* Right arrow: bottom-right is a true panel corner → full concentric radius */
#keyboardPanel [data-key="ArrowRight"] { border-bottom-right-radius: 9px; }

/* Fn row */
.key.fn {
  background: #ffffff;
  height: 28px;
  box-shadow: 0 1px 0 #9aa0a8, inset 0 -1px 0 rgba(0,0,0,0.06);
}
.key.fn .fn-lbl {
  font-size: 8.5px;
  font-weight: 400;
  color: #555;
  position: absolute;
  bottom: 4px;
  left: 0; right: 0;
  text-align: center;
}

/* Letter keys */
.key .letter-lbl {
  font-size: 14px;
  font-weight: 500;
  color: #555;
  line-height: 1;
}

/* Symbol keys */
.key .sym-sub {
  position: absolute;
  top: 4px; left: 5px;
  font-size: 8px;
  color: #777;
  line-height: 1;
}
.key .sym-main {
  font-size: 13px;
  font-weight: 500;
  color: #555;
  line-height: 1;
}
/* PC mode: pull sym-sub away from the now-rounded corner,
   centred above the main glyph with a small upward nudge */
#keyboardPanel.pc-keys .key .sym-sub {
  top: 5px;
  left: 50%;
  transform: translateX(-50%);
}
/* PC mini: sym-main shrinks to same size as sym-sub so the two
   stacked symbols fit inside the smaller circular key */
#keyboardPanel.pc-keys.mini-keys .key .sym-main {
  font-size: 8px;
}
#keyboardPanel.pc-keys.mini-keys .key .sym-sub {
  top: 3px;
  font-size: 7px;
}

/* Utility keys */
.key .util-lbl {
  font-size: 9px;
  font-weight: 400;
  color: #555;
}

/* Modifier keys */
.key .mod-sym {
  font-size: 16px;
  color: #555;
  line-height: 1;
  margin-bottom: 2px;
}
.key .mod-word {
  position: absolute;
  bottom: 4px;
  left: 0; right: 0;
  text-align: center;
  font-size: 8px;
  color: #555;
  font-weight: 400;
  line-height: 1;
}
.key .win-svg {
  width: 14px;
  height: 14px;
  color: #555;
}
.key.lit-green  .win-svg,
.key.lit-orange .win-svg { color: white; }

/* Mini-only: mod key with symbol only, centred */
.key .mod-sym-only {
  font-size: 14px;
  color: #555;
  line-height: 1;
}
/* Mini-only: util key with symbol only, centred */
.key .util-sym-only {
  font-size: 14px;
  color: #555;
  line-height: 1;
}

/* Lock key
   CHANGE 2: .active stays white — no yellow highlight */
.key.lock-key { cursor: pointer; }
.key.lock-key:hover  { background: #e8e8ea; }
.key.lock-key.active { background: #f5f5f7; }
.key .lock-svg { width: 14px; height: 14px; opacity: 0.55; }

/* Spacebar */
.key.space-key { width: 180px; }

/* Arrow keys */
.arrow-stack {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
/* Left/right arrows: full height of bottom row, standard 4px rounding all corners.
   Right arrow gets corner-br (9px) from its corner[] config for the keyboard corner. */
.key.arrow-lr {
  /* Width and height set by inline style in buildKeyboard so mini scales correctly.
     No border-radius here — inherits 4px from .key; .corner-br overrides ▶ bottom-right. */
}
.key.arrow-lr .letter-lbl { font-size: 11px; }
/* Up/down: width, height and gap all set by inline style in buildKeyboard. */
.key.arrow-ud {
}
.key.arrow-up   { border-radius: 4px 4px 0 0; }
.key.arrow-down { border-radius: 0 0 4px 4px; }
.key.arrow-ud .letter-lbl { font-size: 10px; }

/* ══════════════════════════════════════
   PC MODE — rounded keys
   #keyboardPanel.pc-keys sets all keys
   to near-circular. Concentric radii:
   panel 14px → keys 50% (full circle).
   Wide/tall keys use a fixed large px
   value so they pill rather than ellipse.
   Arrow halves get asymmetric rounding.
══════════════════════════════════════ */
#keyboardPanel.pc-keys .key {
  border-radius: 50%;
  transition: background 0.07s, border-radius 0.2s ease;
}
/* Wide utility keys: pill shape */
#keyboardPanel.pc-keys [data-key="Backspace"],
#keyboardPanel.pc-keys [data-key="Tab"],
#keyboardPanel.pc-keys [data-key="CapsLock"],
#keyboardPanel.pc-keys [data-key="Enter"],
#keyboardPanel.pc-keys [data-key="ShiftLeft"],
#keyboardPanel.pc-keys [data-key="ShiftRight"],
#keyboardPanel.pc-keys [data-key="Space"],
#keyboardPanel.pc-keys [data-key="ControlLeft"],
#keyboardPanel.pc-keys [data-key="ControlRight"],
#keyboardPanel.pc-keys [data-key="MetaLeft"],
#keyboardPanel.pc-keys [data-key="AltLeft"],
#keyboardPanel.pc-keys [data-key="AltRight"] {
  border-radius: 40px;
}
/* Fn row keys inherit 50% border-radius from .pc-keys .key —
   their 40×28 native dimensions produce a natural stadium shape.
   Lock key stretches wider via flex and auto-pills. No override needed. */
/* Fn row: pill shape — radius = half the key height (28÷2 = 14px).
   This overrides 50% for fn keys so they pill rather than oval. */
#keyboardPanel.pc-keys .key.fn {
  border-radius: 14px;
}

/* Backquote and ArrowRight sit at panel corners but are sym/arrow keys
   not covered by any pill rule — explicitly keep them circular.
   The .corner-* classes are NOT overridden here: they would stomp the
   pill rules (40px / 14px) applied to Esc, lock, ControlLeft, Backspace. */
#keyboardPanel.pc-keys [data-key="Backquote"],
#keyboardPanel.pc-keys [data-key="ArrowRight"] {
  border-radius: 50%;
}
/* Up/down arrow halves — keep the flat join between them */
#keyboardPanel.pc-keys .key.arrow-up   { border-radius: 40px 40px 8px 8px; }
#keyboardPanel.pc-keys .key.arrow-down { border-radius: 8px 8px 40px 40px; }

/* Mini keyboards (both Mac and PC): shrink regular key heights to
   match the scaled-down width (~28px), keeping keys squarish.
   Fn row scales proportionally. Wide flex keys keep natural height. */
#keyboardPanel.mini-keys .key {
  height: 28px;
}
#keyboardPanel.mini-keys .key.fn {
  height: 19px;
}
/* PC mini overrides — already handled by the rules above now shared */
/* Up/down arrow halves in mini PC: height now set correctly by JS (12px) */
/* Wide/pill/flex keys: keep at 28px in all mini keyboards */
#keyboardPanel.mini-keys [data-key="Backspace"],
#keyboardPanel.mini-keys [data-key="Tab"],
#keyboardPanel.mini-keys [data-key="CapsLock"],
#keyboardPanel.mini-keys [data-key="Enter"],
#keyboardPanel.mini-keys [data-key="ShiftLeft"],
#keyboardPanel.mini-keys [data-key="ShiftRight"],
#keyboardPanel.mini-keys [data-key="Space"],
#keyboardPanel.mini-keys [data-key="ControlLeft"],
#keyboardPanel.mini-keys [data-key="ControlRight"],
#keyboardPanel.mini-keys [data-key="MetaLeft"],
#keyboardPanel.mini-keys [data-key="AltLeft"],
#keyboardPanel.mini-keys [data-key="AltRight"] {
  height: 28px;
}

/* PC keyboard panel: rounder corners + cyan-tinted plastic body */
#keyboardPanel.pc-keys {
  border-radius: 22px;
  background: #9eb8bf;
}

/* Mini Mac number row: nudge sym-main down-right to clear the sym-sub
   which sits top-left. Only digit keys (Digit0-9, Minus, Equal, Backquote)
   need this — letter keys have no sym-sub clash. */
#keyboardPanel.mini-keys:not(.pc-keys) [data-key="Backquote"] .sym-main,
#keyboardPanel.mini-keys:not(.pc-keys) [data-key="Digit1"] .sym-main,
#keyboardPanel.mini-keys:not(.pc-keys) [data-key="Digit2"] .sym-main,
#keyboardPanel.mini-keys:not(.pc-keys) [data-key="Digit3"] .sym-main,
#keyboardPanel.mini-keys:not(.pc-keys) [data-key="Digit4"] .sym-main,
#keyboardPanel.mini-keys:not(.pc-keys) [data-key="Digit5"] .sym-main,
#keyboardPanel.mini-keys:not(.pc-keys) [data-key="Digit6"] .sym-main,
#keyboardPanel.mini-keys:not(.pc-keys) [data-key="Digit7"] .sym-main,
#keyboardPanel.mini-keys:not(.pc-keys) [data-key="Digit8"] .sym-main,
#keyboardPanel.mini-keys:not(.pc-keys) [data-key="Digit9"] .sym-main,
#keyboardPanel.mini-keys:not(.pc-keys) [data-key="Digit0"] .sym-main,
#keyboardPanel.mini-keys:not(.pc-keys) [data-key="Minus"] .sym-main,
#keyboardPanel.mini-keys:not(.pc-keys) [data-key="Equal"] .sym-main {
  position: relative;
  top: 4px;
  left: 3px;
}

/* PC: fn-lbl centres in the key (both full and mini) */
#keyboardPanel.pc-keys .key.fn .fn-lbl {
  position: static;
  font-size: 8px;
}

/* ══════════════════════════════════════
   LIT STATES
══════════════════════════════════════ */
.key.lit-green {
  background: #10b981 !important;
  box-shadow: 0 1px 0 #059669, 0 0 8px rgba(16,185,129,0.5) !important;
}
.key.lit-green .letter-lbl,
.key.lit-green .sym-main,
.key.lit-green .sym-sub,
.key.lit-green .util-lbl,
.key.lit-green .fn-lbl,
.key.lit-green .mod-sym,
.key.lit-green .mod-sym-only,
.key.lit-green .mod-word,
.key.lit-green .util-sym-only { color: white !important; }

.key.lit-orange {
  background: #f97316 !important;
  box-shadow: 0 1px 0 #c2410c, 0 0 8px rgba(249,115,22,0.5) !important;
}
.key.lit-orange .letter-lbl,
.key.lit-orange .sym-main,
.key.lit-orange .sym-sub,
.key.lit-orange .util-lbl,
.key.lit-orange .fn-lbl,
.key.lit-orange .mod-sym,
.key.lit-orange .mod-sym-only,
.key.lit-orange .mod-word,
.key.lit-orange .util-sym-only { color: white !important; }

/* Fade-out transition — applied just before removing lit class */
.key.lit-fading {
  transition: background 0.8s ease, box-shadow 0.8s ease !important;
}
.key.lit-fading .letter-lbl,
.key.lit-fading .sym-main,
.key.lit-fading .sym-sub,
.key.lit-fading .util-lbl,
.key.lit-fading .fn-lbl,
.key.lit-fading .mod-sym,
.key.lit-fading .mod-sym-only,
.key.lit-fading .mod-word,
.key.lit-fading .util-sym-only {
  transition: color 0.8s ease !important;
}

/* ══════════════════════════════════════
   BREAKPOINTS
   < 600px: keyboard hidden; stats bar still shows
   600-819: mini keyboard
   >= 820:  full keyboard
══════════════════════════════════════ */
@media (max-width: 599px) {
  #keyboardWrap { display: none; }

  body { padding: 12px; }

  #gameContainer { padding: 14px 16px 12px; }

  .topRow { gap: 10px; min-height: 72px; }

  .leftPanel { width: 108px; }

  #mainBtn, #helpBtn { width: 108px; font-size: 12px; }

  .rightPanel { width: 90px; }

  .timerBox { width: 90px; height: 90px; }
  .timerBox .timer-time,
  .timerBox .timer-accuracy { font-size: 18px; }
  .timerBox .timer-icon,
  .timerBox .accuracy-icon  { width: 11px; height: 11px; }
  .timerBox .timer-top    { padding-bottom: 3px; }
  .timerBox .timer-bottom { padding-top: 3px; }

  #title { font-size: 18px; }

  #questionRow { font-size: 13px; padding: 2px 12px; }

  #statsRow { padding: 6px 0 8px; }
  #statLeft  { width: 108px; }
  #statRight { width: 90px; }
}

/* ══════════════════════════════════════
   OS TOGGLE ROW
   The toggle group is pinned to the same
   left edge as the buttons (24px inset).
   The switch itself — not its labels —
   aligns with the horizontal centre of
   the buttons (width 140px → centre 70px).
   So we offset: 24px + 70px - (switch_w/2)
   Switch track: 36×14px stroke rect.
   Knob: 10px circle, 2px stroke.
══════════════════════════════════════ */
#osRow {
  display: flex;
  align-items: center;
  width: 100%;
  max-width: 900px;
  padding: 0 24px 8px;
  position: relative;
  box-sizing: border-box;
  min-height: 28px;
}
/* Wrap is exactly as wide as the Start button (130px).
   Three columns: Mac-label (left), switch (centre), PC-label (right).
   justify-content: space-between pushes labels to the edges;
   the switch sits in the physical centre of the box. */
#osToggleWrap {
  width: 130px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
#osToggleWrap .os-label {
  font-family: 'Lato', system-ui, sans-serif;
  font-size: 12px;
  color: #9ca3af;
  user-select: none;
  display: flex;
  align-items: center;
  gap: 3px;
  line-height: 1;
}
#osLabelLeft  { justify-content: flex-start; }
#osLabelRight { justify-content: flex-end; }

/* SVG toggle switch */
.os-switch {
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  /* reserve space for the SVG track (36×14) */
  width: 36px;
  height: 14px;
}
.os-switch input {
  position: absolute;
  opacity: 0;
  width: 0; height: 0;
  pointer-events: none;
}
.os-track {
  display: block;
  pointer-events: none;
  overflow: visible;
}
/* Knob: slide via transform; fill swap gives mac/pc visual state */
#osKnobEl {
  transition: transform 0.18s ease, fill 0.18s ease;
  transform-origin: 7px 7px;
  transform-box: fill-box;
}

#osMismatchPill {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  background: #f59e0b;
  color: white;
  font-family: 'Lato', system-ui, sans-serif;
  font-size: 12px;
  font-weight: 600;
  padding: 5px 14px;
  border-radius: 12px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
#osMismatchPill.show { opacity: 1; }
/* ══════════════════════════════════════
   APP SELECTOR — in osRow, right-aligned
   "now training on:" label inline-left
   of the pill. Pill expands in-place to
   show full list; selected item stays in
   its natural list slot always.
══════════════════════════════════════ */
#appSelectorWrap {
  margin-left: auto;          /* pushes to right end of osRow */
  display: flex;
  align-items: center;
  gap: 7px;
  flex-shrink: 0;
  position: relative;
}
#appSelectorLabel {
  font-family: 'Lato', system-ui, sans-serif;
  font-size: 12px;
  color: #9ca3af;
  line-height: 1;
  white-space: nowrap;
  margin: 0;
}

/* The pill container. Clips overflow so expanding rows
   never bleed outside the rounded border. */
#appPill {
  position: relative;
  border-radius: 10px;
  border: 1.5px solid #9ca3af;
  background: white;
  overflow: hidden;
  cursor: pointer;
  user-select: none;
  /* closed: one row + border */
  max-height: 27px;
  transition: max-height 0.22s ease, border-color 0.15s, background-color 0.15s;
  box-sizing: border-box;
  overscroll-behavior: none;
}
#appPill.open {
  max-height: 123px;
}
/* During game: border and background vanish — looks like plain text.
   JS blocks interaction via gameState check. Pill stays in layout. */
#appPill.game-active {
  border-color: transparent;
  background-color: transparent;
  cursor: default;
}
#appPill.game-active .app-caret {
  opacity: 0;
}

/* Each row inside the pill */
.app-option {
  display: flex;
  align-items: center;
  gap: 5px;
  height: 24px;
  line-height: 1;
  padding: 0 10px 0 7px;
  font-family: 'Lato', system-ui, sans-serif;
  font-size: 12px;
  color: #9ca3af;
  white-space: nowrap;
  box-sizing: border-box;
  opacity: 0;
  transition: opacity 0.18s ease, background 0.1s;
  cursor: pointer;
  pointer-events: none;
}
#appPill.open .app-option {
  opacity: 1;
  pointer-events: auto;
}
.app-option:hover {
  background: #f0f9ff;
  color: #374151;
}
/* Selected row always visible — scrollTop brings it into the 22px window */
.app-option.selected {
  opacity: 1;
  color: #6b7280;
  font-weight: 500;
  pointer-events: none;    /* not clickable when closed (it's already selected) */
}
#appPill.open .app-option.selected {
  pointer-events: auto;
}
/* Caret — sits left of the app name, rotates when open */
.app-caret {
  font-size: 7px;
  color: #9ca3af;
  line-height: 1;
  flex-shrink: 0;
  width: 8px;                /* fixed width so name column is stable */
  display: inline-block;
  transition: transform 0.2s ease;
  text-align: center;
}
/* Non-selected rows: caret invisible (space reserved) */
.app-option:not(.selected) .app-caret {
  opacity: 0;
}
#appPill.open .app-option.selected .app-caret {
  transform: rotate(90deg);   /* points down ▼ when open */
}
</style>
</head>

/* ══════════════════════════════════════
   KEYBOARD BUILDER
══════════════════════════════════════ */
const keyEls = {};
let lockKeyEl = null;

const LOCK_SVG = `<svg class="lock-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <rect x="5" y="11" width="14" height="10" rx="2"/>
  <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
</svg>`;

function buildKey(cfg, isMini) {
  const el = document.createElement('div');
  const classes = ['key'];
  if (cfg.cls)    cfg.cls.forEach(c => classes.push(c));
  if (cfg.corner) cfg.corner.forEach(c => classes.push('corner-' + c));
  el.className = classes.join(' ');

  if (cfg.w) el.style.width  = cfg.w + 'px';
  if (cfg.h) el.style.height = cfg.h + 'px';

  switch (cfg.type) {
    case 'fn':
      el.classList.add('fn');
      el.innerHTML = `<span class="fn-lbl">${cfg.label}</span>`;
      el.addEventListener('mousedown', showKbToast);
      break;
    case 'lock':
      el.classList.add('fn', 'lock-key');
      el.innerHTML = LOCK_SVG;
      el.style.display = 'flex';
      el.style.alignItems = 'center';
      el.style.justifyContent = 'center';
      el.addEventListener('mousedown', e => { e.preventDefault(); togglePause(); });
      lockKeyEl = el;
      break;
    case 'letter':
      el.innerHTML = `<span class="letter-lbl">${cfg.label}</span>`;
      el.addEventListener('mousedown', showKbToast);
      break;
    case 'sym':
      el.innerHTML = `<span class="sym-sub">${cfg.sub}</span><span class="sym-main">${cfg.main}</span>`;
      el.addEventListener('mousedown', showKbToast);
      break;
    case 'util':
      if (isMini && cfg.mini && cfg.mini.length <= 2 && /\p{So}|\p{Sm}|[⇧↩↑↓←→]/u.test(cfg.mini)) {
        // Mini symbol keys: large centred glyph
        el.innerHTML = `<span class="util-sym-only">${cfg.mini}</span>`;
      } else {
        el.innerHTML = `<span class="util-lbl">${isMini ? cfg.mini : cfg.label}</span>`;
      }
      el.addEventListener('mousedown', showKbToast);
      break;
    case 'mod':
      if (isMini) {
        // Mini: symbol only, centred — no word label beneath
        el.innerHTML = `<span class="mod-sym-only">${cfg.sym || cfg.mini}</span>`;
      } else {
        el.innerHTML = `<span class="mod-sym">${cfg.sym}</span><span class="mod-word">${cfg.word}</span>`;
      }
      el.addEventListener('mousedown', showKbToast);
      break;
    case 'space':
      el.addEventListener('mousedown', showKbToast);
      break;
    case 'arrow':
      el.classList.add('arrow-lr');
      el.innerHTML = `<span class="letter-lbl">${cfg.label}</span>`;
      el.addEventListener('mousedown', showKbToast);
      break;
    case 'winkey':
      el.innerHTML = `<svg class="win-svg" width="14" height="14" viewBox="0 0 102.73 104.6" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M16,50.4h26.6v-27.7l-26.6,6.3v21.4Z"/><path d="M86,12.6l-37,8.6v29.2h37V12.6Z"/><path d="M16,76.2l26.6,6.3v-25.6H16v19.3Z"/><path d="M49,84l37,8.6v-35.7h-37v27.1Z"/></svg>`;
      el.addEventListener('mousedown', showKbToast);
      break;
  }

  if (cfg.id) { keyEls[cfg.id] = el; el.dataset.key = cfg.id; }

  // Keys that stretch to fill remaining row width
  const FLEX_KEYS = new Set(['Backspace','Tab','CapsLock','Enter','ShiftLeft','ShiftRight','Space']);
  if (FLEX_KEYS.has(cfg.id) || cfg.type === 'lock') {
    el.style.flex = '1 1 0';
    el.style.minWidth = '0';
    el.style.width = '';  // remove fixed px width so flex takes over
  }

  return el;
}

function fnKey(id, label, corner)             { return {type:'fn',     id, label, corner: corner||[]}; }
function lKey(id, label, corner)              { return {type:'letter',  id, label, corner: corner||[]}; }
function sKey(id, main, sub, corner)          { return {type:'sym',    id, main, sub, corner: corner||[]}; }
function uKey(id, label, mini, w, corner)     { return {type:'util',   id, label, mini, w, corner: corner||[]}; }
function mKey(id, sym, word, mini, w, corner) { return {type:'mod',    id, sym, word, mini, w, corner: corner||[]}; }
function spaceKey(w)                          { return {type:'space',   id:'Space', w}; }

const PC_BOTTOM_ROW = [
  uKey('ControlLeft',  'ctrl',    'ctrl', 52, ['bl']),
  {type:'winkey', id:'MetaLeft',  w:52, corner:[]},
  uKey('AltLeft',      'alt',     'alt',  52),

function buildKeyboard(isMini) {
  const rowIds = ['row-fn','row-num','row-q','row-a','row-z','row-bot'];
  rowIds.forEach(id => { document.getElementById(id).innerHTML = ''; });
  Object.keys(keyEls).forEach(k => delete keyEls[k]);
  lockKeyEl = null;
  // Track mini state as a CSS class for targeted overrides
  document.getElementById('keyboardPanel').classList.toggle('mini-keys', isMini);

  // Swap in the PC bottom row when PC mode is active
  const layout = FULL_LAYOUT.map((row, ri) => ri === 5 && currentOs === 'pc' ? PC_BOTTOM_ROW : row);

  layout.forEach((row, ri) => {
    const rowEl = document.getElementById(rowIds[ri]);
    row.forEach(cfg => {
      if (cfg.type === 'updown') {
        // Full: lr=40px, gap=4px, each ud=(40-4)/2=18px → 18+4+18=40 ✓
        // Mini Mac: lr=27px, kh=18 (keep original proportions)
        // Mini PC:  lr=27px, gap=3px, each ud=(27-3)/2=12px → 12+3+12=27 ✓
        const kw   = isMini ? Math.round(40*0.68) : 40;  // 27 or 40
        const gap  = isMini ? 3 : 4;
        const kh   = isMini ? 12 : 18;
        const stack = document.createElement('div');
        stack.className = 'arrow-stack';
        stack.style.gap = gap + 'px';
        [['ArrowUp','▲','arrow-up'],['ArrowDown','▼','arrow-down']].forEach(([dir,lbl,cls]) => {
          const el = document.createElement('div');
          el.className = 'key arrow-ud ' + cls;
          el.style.width  = kw + 'px';
          el.style.height = kh + 'px';
          el.innerHTML = `<span class="letter-lbl">${lbl}</span>`;
          el.addEventListener('mousedown', showKbToast);
          keyEls[dir] = el; el.dataset.key = dir;
          stack.appendChild(el);
        });
        rowEl.appendChild(stack);
        return;
      }

      let keyCfg = cfg;
      if (isMini) {
        keyCfg = Object.assign({}, cfg);
        keyCfg.w = cfg.w ? Math.round(cfg.w * 0.68) : 28;
        if (cfg.type === 'fn' || cfg.type === 'lock') keyCfg.h = 19;
        if (cfg.type === 'space') keyCfg.w = Math.round((cfg.w || 180) * 0.68);
        if (cfg.type === 'arrow') { keyCfg.w = 27; keyCfg.h = 27; } // square on both OS mini
        if (cfg.type === 'winkey') keyCfg.w = Math.round(52 * 0.68);
      } else {
        if (cfg.type === 'arrow') { keyCfg = Object.assign({}, cfg); keyCfg.w = 40; keyCfg.h = 40; }
      }

      const el = buildKey(keyCfg, isMini);
      rowEl.appendChild(el);
    });
  });
}

function detectOs() {
  const ua = navigator.userAgent || '';
  const platform = (navigator.userAgentData?.platform || navigator.platform || '').toLowerCase();
  // Check for touch FIRST — iPadOS 13+ reports itself as macOS in the UA,
  // so a touch-capable "Mac" is almost certainly an iPad or similar tablet.
  const isTouch = navigator.maxTouchPoints > 1;
  if (isTouch && (/mac/i.test(platform) || /mac os x/i.test(ua))) return 'mobile';
  if (/android|iphone|ipad|ipod/i.test(ua))                        return 'mobile';
  if (/mac/i.test(platform) || /mac os x/i.test(ua))               return 'mac';
  if (/win/i.test(platform) || /windows/i.test(ua))                return 'pc';
  // Linux / ChromeOS / unknown — treat like PC (Ctrl-based)
  return 'other';
}

/* ══════════════════════════════════════
   SHORTCUT → KEY CODES
   CHANGE 1: extended for new shortcuts
══════════════════════════════════════ */
function shortcutToCodes(s) {
  const u = s.toUpperCase();
  const CMD  = currentOs === 'pc' ? ['ControlLeft','ControlRight'] : ['MetaLeft','MetaRight'];
  const OPT  = ['AltLeft','AltRight'];
  const SH   = ['ShiftLeft','ShiftRight'];

  if (u === 'SPACE')  return ['Space'];
  if (u === 'TAB')    return ['Tab'];
  if (u === 'HOME')   return ['Home'];
  if (u === 'END')    return ['End'];
  if (u === 'SHIFT')  return SH;
  if (u === 'OPTION') return OPT;

  // Arrow keys bare
  if (u === 'ARROWLEFT')  return ['ArrowLeft'];
  if (u === 'ARROWRIGHT') return ['ArrowRight'];
  if (u === 'ARROWUP')    return ['ArrowUp'];
  if (u === 'ARROWDOWN')  return ['ArrowDown'];

  // SHIFT + arrow
  if (u === 'SHIFT+ARROWLEFT')  return [...SH, 'ArrowLeft'];
  if (u === 'SHIFT+ARROWRIGHT') return [...SH, 'ArrowRight'];
  if (u === 'SHIFT+ARROWUP')    return [...SH, 'ArrowUp'];
  if (u === 'SHIFT+ARROWDOWN')  return [...SH, 'ArrowDown'];

  // SHIFT + letter (e.g. SHIFT+A)
  if (u.startsWith('SHIFT+') && !u.includes('CMD') && !u.includes('OPTION')) {
    const key = charToCode(u.slice(6));
    return [...SH, key].filter(Boolean);
  }

  // OPTION + arrow
  if (u === 'OPTION+ARROWLEFT')  return [...OPT, 'ArrowLeft'];
  if (u === 'OPTION+ARROWRIGHT') return [...OPT, 'ArrowRight'];
  if (u === 'OPTION+ARROWUP')    return [...OPT, 'ArrowUp'];
  if (u === 'OPTION+ARROWDOWN')  return [...OPT, 'ArrowDown'];

  // OPTION + bracket (AE layer in/out)
  if (u === 'OPTION+[') return [...OPT, 'BracketLeft'];
  if (u === 'OPTION+]') return [...OPT, 'BracketRight'];

  // OPTION + SHIFT + key (AE keyframe shortcuts)
  if (u.startsWith('OPTION+SHIFT+')) {
    const key = charToCode(u.slice(13));
    return [...OPT, ...SH, key].filter(Boolean);
  }

  // CMD + OPTION + SHIFT + key
  if (u.startsWith('CMD+SHIFT+OPTION+') || u.startsWith('CMD+OPTION+SHIFT+')) {
    const rest = u.startsWith('CMD+SHIFT+OPTION+') ? u.slice(17) : u.slice(17);
    const key = charToCode(rest);
    return [...CMD, ...SH, ...OPT, key].filter(Boolean);
  }

  // CMD + OPTION + key
  if (u.startsWith('CMD+OPTION+')) {
    const key = charToCode(u.slice(11));
    return [...CMD, ...OPT, key].filter(Boolean);
  }

  // CMD + SHIFT + key
  if (u.startsWith('CMD+SHIFT+')) {
    const key = charToCode(u.slice(10));
    return [...CMD, ...SH, key].filter(Boolean);
  }

  // CMD + key
  if (u.startsWith('CMD+')) {
    const key = charToCode(u.slice(4));
    return [...CMD, key].filter(Boolean);
  }

  // Bare single character (letter, digit, punctuation)
  const c = charToCode(u);
  return c ? [c] : [];
}

function charToCode(ch) {
  const map = {
    'RETURN':'Enter','ENTER':'Enter',
    ';':'Semicolon','=':'Equal','-':'Minus',
    '[':'BracketLeft',']':'BracketRight',
    '/':'Slash','.':'Period',',':'Comma',
    '<':'Comma','>':'Period',          // Shift+, and Shift+. produce < and >
    '0':'Digit0','1':'Digit1','2':'Digit2','3':'Digit3',
    '4':'Digit4','5':'Digit5','6':'Digit6','7':'Digit7',
    '8':'Digit8','9':'Digit9',
    'ARROWLEFT':'ArrowLeft','ARROWRIGHT':'ArrowRight',
    'ARROWUP':'ArrowUp','ARROWDOWN':'ArrowDown',
    'HOME':'Home','END':'End',
  };
  if (map[ch]) return map[ch];
  if (ch.length === 1 && ch >= 'A' && ch <= 'Z') return 'Key' + ch;
  return null;
}

/* ══════════════════════════════════════
   KEYBOARD LIGHTING
══════════════════════════════════════ */
const heldKeys  = new Set();
let   greenHeld = new Set();

// Pairs of interchangeable L/R keys — holding either satisfies the requirement
const LR_PAIRS = [
  ['ShiftLeft','ShiftRight'],
  ['AltLeft','AltRight'],
  ['MetaLeft','MetaRight'],
  ['ControlLeft','ControlRight'],
];
function neededSatisfied(needed) {
  // Returns true if every code in needed is satisfied —
  // either held directly, or its L/R partner is held.
  return needed.every(c => {
    if (greenHeld.has(c)) return true;
    const pair = LR_PAIRS.find(p => p.includes(c));
    return pair ? pair.some(p => greenHeld.has(p)) : false;
  });
}

// Per-key linger timers — so each key fades independently
const lingerTimers = {};
const LINGER_MS = 800;

function clearAllLit() {
  Object.values(keyEls).forEach(el => {
    el.classList.remove('lit-green','lit-orange','lit-fading');
  });
  Object.keys(lingerTimers).forEach(k => { clearTimeout(lingerTimers[k]); delete lingerTimers[k]; });
  // Also reset the extended key pill
  clearTimeout(extKeyPillTimer);
  extKeyPillEl.className = '';
  extKeyPillEl.style.display = 'none';
  greenHeld.clear();
}

function setKeyLit(code, state) {
  const el = keyEls[code];
  if (!el) return;
  // Cancel any pending linger fade for this key
  if (lingerTimers[code]) { clearTimeout(lingerTimers[code]); delete lingerTimers[code]; }
  el.classList.remove('lit-green','lit-orange','lit-fading');
  if (state) el.classList.add('lit-' + state);
}

function fadeKeyOut(code) {
  const el = keyEls[code];
  if (!el) return;
  if (lingerTimers[code]) { clearTimeout(lingerTimers[code]); delete lingerTimers[code]; }
  lingerTimers[code] = setTimeout(() => {
    delete lingerTimers[code];
    el.classList.add('lit-fading');
    // Next frame: remove the lit colour so the slow transition takes over
    requestAnimationFrame(() => requestAnimationFrame(() => {
      el.classList.remove('lit-green','lit-orange');
      // Clean up fading class after transition completes
      setTimeout(() => el.classList.remove('lit-fading'), 900);
    }));
  }, LINGER_MS);
}

function isKeyPartOfShortcut(e, token) {
  // Returns true if this key event is one of the required keys for the token.
  // Uses the same modifier-flag logic as matchesShortcut so they stay in sync.
  const u = token.toUpperCase();
  const code = e.code;

  // Determine which modifiers the token needs
  const needsCmd   = u.includes('CMD');
  const needsShift = u.includes('SHIFT');
  const needsOpt   = u.includes('OPTION');

  // Is this key press a modifier key that the shortcut requires?
  const isCmdKey   = code === 'MetaLeft'    || code === 'MetaRight' ||
                     code === 'ControlLeft' || code === 'ControlRight';
  const isShiftKey = code === 'ShiftLeft'   || code === 'ShiftRight';
  const isOptKey   = code === 'AltLeft'     || code === 'AltRight';

  if (isCmdKey   && needsCmd)   return true;
  if (isShiftKey && (u === 'SHIFT' || (u.includes('SHIFT') && needsShift))) return true;
  if (isOptKey   && (u === 'OPTION' || (u.includes('OPTION') && needsOpt))) return true;

  // Is this the character key? Use shortcutToCodes to get the expected code
  // but also cross-check via e.key for shifted-character edge cases
  const needed = shortcutToCodes(token);
  const charCodes = needed.filter(c =>
    !['MetaLeft','MetaRight','ControlLeft','ControlRight',
      'ShiftLeft','ShiftRight','AltLeft','AltRight'].includes(c)
  );
  if (charCodes.length === 0) return false;

  // Primary check: e.code matches
  if (charCodes.includes(code)) return true;

  // Fallback: e.key normalised matches (handles shifted punctuation etc.)
  const ku = e.key.toUpperCase();
  return charCodes.some(c => {
    // Convert code like 'KeyU' → 'U', 'BracketLeft' → '[', 'Period' → '.' etc.
    const codeToKey = {
      'BracketLeft':'[','BracketRight':']','Semicolon':';','Equal':'=',
      'Minus':'-','Slash':'/','Period':'.','Comma':',',
      'ArrowLeft':'ARROWLEFT','ArrowRight':'ARROWRIGHT',
      'ArrowUp':'ARROWUP','ArrowDown':'ARROWDOWN',
      'Home':'HOME','End':'END','Enter':'RETURN','Space':' ','Tab':'TAB',
    };
    if (codeToKey[c]) return ku === codeToKey[c].toUpperCase();
    if (c.startsWith('Key'))   return ku === c.slice(3);
    if (c.startsWith('Digit')) return ku === c.slice(5);
    return false;
  });
}

// Extended key labels for the ghost pill
const EXT_KEY_LABELS = {
  'Home': 'home', 'End': 'end',
  'PageUp': 'pg up', 'PageDown': 'pg dn',
  'Insert': 'insert', 'Delete': 'del',
  'PrintScreen': 'prt sc', 'ScrollLock': 'scr lk', 'Pause': 'pause',
  'NumLock': 'num lk',
};
const extKeyPillEl = document.getElementById('extKeyPill');
let extKeyPillTimer = null;

function showExtKeyPill(code, state) {
  const label = EXT_KEY_LABELS[code];
  if (!label) return;
  clearTimeout(extKeyPillTimer);
  extKeyPillEl.textContent = label;
  extKeyPillEl.className = '';          // clear lit classes
  extKeyPillEl.style.display = 'flex';
  if (state) extKeyPillEl.classList.add('lit-' + state);
}

function hideExtKeyPill() {
  // Linger then fade, matching real key behaviour
  clearTimeout(extKeyPillTimer);
  extKeyPillEl.classList.add('lit-fading');
  requestAnimationFrame(() => requestAnimationFrame(() => {
    extKeyPillEl.classList.remove('lit-green', 'lit-orange');
    extKeyPillTimer = setTimeout(() => {
      extKeyPillEl.classList.remove('lit-fading');
      extKeyPillEl.style.display = 'none';
    }, 900);
  }));
}

function updateKeyboardLighting(e, isDown) {
  const code = e.code;
  if (isDown) {
    const alreadyHeld = heldKeys.has(code);
    heldKeys.add(code);
    if (gameState !== 'playing') return;
    const isModifier = code === 'MetaLeft'    || code === 'MetaRight'   ||
                       code === 'ControlLeft' || code === 'ControlRight' ||
                       code === 'ShiftLeft'   || code === 'ShiftRight'   ||
                       code === 'AltLeft'     || code === 'AltRight';
    const isExtKey = code in EXT_KEY_LABELS;
    const isCorrect = isKeyPartOfShortcut(e, currentAnswer);
    if (isCorrect) {
      greenHeld.add(code);
      if (isExtKey) {
        showExtKeyPill(code, 'green');
      } else {
        setKeyLit(code, 'green');
      }
      if (!alreadyHeld && !isModifier) { greenHits++; totalHits++; updateAccuracyDisplay(); }
    } else {
      if (isExtKey) {
        showExtKeyPill(code, 'orange');
      } else {
        setKeyLit(code, 'orange');
      }
      if (!alreadyHeld && !isModifier) { totalHits++; updateAccuracyDisplay(); }
    }
  } else {
    heldKeys.delete(code);
    greenHeld.delete(code);
    if (code in EXT_KEY_LABELS) {
      hideExtKeyPill();
    } else {
      fadeKeyOut(code);
    }
  }
}

function shuffleArray(arr) {
  const a = arr.slice();
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function formatTime(s) {
  const m = Math.floor(s/60), sec = s%60;
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

  if (gameState !== 'playing') return;

  'RETURN':     { sym: '↩', name: 'Return' },
  'ARROWLEFT':  { sym: '←', name: 'Left' },
  'ARROWRIGHT': { sym: '→', name: 'Right' },
  'SPACE':      { sym: '␣', name: 'Space' },
  'TAB':        { sym: '⇥', name: 'Tab' },
};
const KEY_DISPLAY_PC = {
  'CMD':        { sym: 'Ctrl', name: '' },
  'SHIFT':      { sym: '⇧', name: 'Shift' },
  'OPTION':     { sym: 'Alt', name: '' },
  'RETURN':     { sym: '↵', name: 'Enter' },
  'ARROWLEFT':  { sym: '←', name: 'Left' },
  'ARROWRIGHT': { sym: '→', name: 'Right' },
  'SPACE':      { sym: '␣', name: 'Space' },
  'TAB':        { sym: '⇥', name: 'Tab' },
};

function pillHTML(token) {
  const map = currentOs === 'pc' ? KEY_DISPLAY_PC : KEY_DISPLAY_MAC;
  const k = map[token.toUpperCase()];
  const label = k ? (k.name ? k.sym + ' ' + k.name : k.sym) : token;
  return '<span style="display:inline-block;background:#f59e0b;color:white;font-weight:700;font-size:12px;padding:3px 10px;border-radius:10px;white-space:nowrap;">' + label + '</span>';
}

function buildHintHTML(shortcut) {
  const parts = shortcut.toUpperCase().split('+');
  return parts.map(pillHTML).join(' <span style="color:#6b7280;font-weight:700;">+</span> ');
}

function toggleHelp() {
  clearTimeout(helpFadeTimer);
  if (!helpActive) {
    helpActive = true;
    // Show hint in the toast pill (same as keyboard tap message)
    kbToastEl.innerHTML = buildHintHTML(currentAnswer);
    kbToastEl.classList.add('show');
    clearTimeout(toastTimer);
    // Apply -5% accuracy penalty
    totalHits += 5;
    updateAccuracyDisplay();
    // Flash bottom half orange to show the penalty
    clearTimeout(accuracyPenaltyTimeout);
    timerBox.classList.add('penalty-acc');
    accuracyEl.textContent = '-5%';
    accuracyPenaltyTimeout = setTimeout(() => {
      timerBox.classList.remove('penalty-acc');
      updateAccuracyDisplay();
    }, 2000);
    helpFadeTimer = setTimeout(() => {
      helpActive = false;
      kbToastEl.classList.remove('show');
    }, 3000);
  } else {
    helpActive = false;
    kbToastEl.classList.remove('show');
  }
}

function clearHelp() {
  clearTimeout(helpFadeTimer);
  helpActive = false;
  kbToastEl.classList.remove('show');
}

/* ══════════════════════════════════════
   PAUSE / EASTER EGG
══════════════════════════════════════ */
function togglePause() {
  if (gameState === 'playing')                          { enterPause(); return; }
  if (gameState === 'paused')                           { unpause(); return; }
  if (gameState === 'confirm-reset')                    { confirmResetNo(); return; }
  // CHANGE 4: lock from idle or finished → confirm-reset directly
  if (gameState === 'idle' || gameState === 'finished') { enterConfirmReset(); return; }
}

function enterPause() {
  gameState = 'paused';
  clearInterval(timerInterval);
  clearTimeout(penaltyTimeout);
  clearHelp();

  titleEl.classList.add('blurred');
  titleEl.classList.remove('strike','hidden');
  setTimerState('paused', '⏸');
  mainBtn.textContent = 'Unpause';
  // CHANGE 3: Reset button stays grey (not red)
  helpBtn.textContent = 'Reset';
  helpBtn.style.background = '#6b7280';
  helpBtn.style.color = 'white';
  // CHANGE 2: lock key stays white — .active class in CSS keeps #f5f5f7
  if (lockKeyEl) lockKeyEl.classList.add('active');
}

function unpause() {
  gameState = 'playing';
  titleEl.classList.remove('blurred');
  helpBtn.style.background = '';
  helpBtn.style.color = '';
  resetTimerBox();
  mainBtn.textContent = 'Skip';
  helpBtn.textContent = 'Help';
  if (lockKeyEl) lockKeyEl.classList.remove('active');
  timerInterval = setInterval(updateTimer, 100);
}

function enterConfirmReset() {
  gameState = 'confirm-reset';
  titleEl.classList.remove('blurred');
  titleEl.className = '';
  titleEl.textContent = 'Reset your best score and start again?';
  mainBtn.textContent = 'Yes';
  mainBtn.style.background = '#10b981';
  helpBtn.textContent = 'No';
  helpBtn.style.background = '#6b7280';
  helpBtn.style.color = 'white';
}

function confirmResetYes() {
  bestRecord = { time: null, accuracy: null };
  try { localStorage.removeItem('kw_best'); } catch(e) {}
  updateBestDisplay();
  if (lockKeyEl) lockKeyEl.classList.remove('active');
  resetToIdle();
}

function confirmResetNo() {
  // If a game was in progress, return to paused; otherwise go to idle
  if (questionPool.length > 0 && answersLeft > 0 && answersLeft < 10) {
    gameState = 'paused';
    titleEl.classList.add('blurred');
    titleEl.textContent = questionPool[questionIndex]?.display || '';
    mainBtn.textContent = 'Unpause';
    helpBtn.textContent = 'Reset';
    helpBtn.style.background = '#6b7280';
    helpBtn.style.color = 'white';
  } else {
    resetToIdle();
  }
}

function resetToIdle() {
  gameState = 'idle';
  setAppSelectorGameActive(false);
  clearInterval(timerInterval);
  clearTimeout(penaltyTimeout);
  clearHelp();
  clearAllLit();
  heldKeys.clear();
  document.removeEventListener('keyup', handleKeyup);

  mainBtn.textContent = 'Start the game';
  mainBtn.style.background = '';
  helpBtn.textContent = 'Help';
  helpBtn.style.background = '';
  helpBtn.style.color = '';
  if (lockKeyEl) lockKeyEl.classList.remove('active');
  titleEl.className = '';
  titleEl.textContent = 'Play Keyboard Warrior';
  questionCountEl.textContent = '';
  timerBox.className = 'timerBox';
  timerDiv.textContent = '0:00';
  greenHits = 0; totalHits = 0; updateAccuracyDisplay();
}

/* ══════════════════════════════════════
   GAME FLOW
   CHANGE 1: matchesShortcut extended for new shortcuts
══════════════════════════════════════ */
function matchesShortcut(event, str) {
  const s    = str.toUpperCase();
  const cmd  = currentOs === 'pc' ? event.ctrlKey  : event.metaKey;
  const nocmd= currentOs === 'pc' ? !event.ctrlKey && !event.metaKey : !event.metaKey && !event.ctrlKey;
  const opt  = event.altKey;
  const sh   = event.shiftKey;
  const k    = event.key;
  const ku   = k.toUpperCase();
  // e.code gives the physical key regardless of modifier remapping.
  // e.g. Option+C fires event.key='ç' but event.code='KeyC'.
  // We derive a plain char from e.code for Option-combo matching.
  const codeChar = (() => {
    const c = event.code;
    if (c && c.startsWith('Key'))   return c.slice(3);      // 'KeyC' → 'C'
    if (c && c.startsWith('Digit')) return c.slice(5);      // 'Digit2' → '2'
    return null;
  })();

  // Helper: does the event key match the expected bare char/token?
  function keyIs(exp) {
    if (exp === '='   ) return k === '=' || k === '+';
    if (exp === 'RETURN') return k === 'Enter';
    if (exp === 'ARROWLEFT')  return k === 'ArrowLeft';
    if (exp === 'ARROWRIGHT') return k === 'ArrowRight';
    if (exp === 'ARROWUP')    return k === 'ArrowUp';
    if (exp === 'ARROWDOWN')  return k === 'ArrowDown';
    if (exp === 'HOME') return k === 'Home';
    if (exp === 'END')  return k === 'End';
    if (exp === '[')    return k === '[' || (k === '{' && sh);
    if (exp === ']')    return k === ']' || (k === '}' && sh);
    if (exp === '/')    return k === '/';
    if (exp === '.')    return k === '.';
    if (exp === ',')    return k === ',';
    if (exp === ';')    return k === ';' || k === '…';
    if (exp === '-')    return k === '-';
    if (exp === '<')    return k === '<' || (k === ',' && sh);
    if (exp === '>')    return k === '>' || (k === '.' && sh);
    if (exp === '2')    return k === '2' || k === '™';
    if (exp === '3')    return k === '3' || k === '£';
    if (exp === '8')    return k === '8' || k === '•';
    if (exp === 'A' && s.startsWith('SHIFT+A') && !s.includes('CMD') && !s.includes('OPTION')) {
      return ku === 'A';
    }
    // For letters/digits: accept event.key match OR physical code match.
    // This handles Option remapping (e.g. Option+C → event.key='ç' but code='KeyC').
    if (codeChar && codeChar === exp) return true;
    return ku === exp;
  }

  // ── Bare modifiers ─────────────────────────────────────────────────────────
  if (s === 'SHIFT')  return k === 'Shift' && nocmd && !opt;
  if (s === 'OPTION') return k === 'Alt'   && nocmd && !sh;

  // ── Bare non-modifier keys ─────────────────────────────────────────────────
  if (s === 'SPACE')  return k === ' '          && nocmd && !opt && !sh;
  if (s === 'TAB')    return k === 'Tab'         && nocmd && !opt && !sh;
  if (s === 'HOME')   return k === 'Home'        && nocmd && !opt && !sh;
  if (s === 'END')    return k === 'End'         && nocmd && !opt && !sh;
  if (s === '[')      return k === '['           && nocmd && !opt && !sh;
  if (s === ']')      return k === ']'           && nocmd && !opt && !sh;
  if (s === '.')      return k === '.'           && nocmd && !opt && !sh;
  if (s === ',')      return k === ','           && nocmd && !opt && !sh;

  // ── Arrow keys bare ────────────────────────────────────────────────────────
  if (s === 'ARROWLEFT')  return k === 'ArrowLeft'  && nocmd && !opt && !sh;
  if (s === 'ARROWRIGHT') return k === 'ArrowRight' && nocmd && !opt && !sh;
  if (s === 'ARROWUP')    return k === 'ArrowUp'    && nocmd && !opt && !sh;
  if (s === 'ARROWDOWN')  return k === 'ArrowDown'  && nocmd && !opt && !sh;

  // ── SHIFT + arrow ──────────────────────────────────────────────────────────
  if (s === 'SHIFT+ARROWLEFT')  return k === 'ArrowLeft'  && sh && nocmd && !opt;
  if (s === 'SHIFT+ARROWRIGHT') return k === 'ArrowRight' && sh && nocmd && !opt;
  if (s === 'SHIFT+ARROWUP')    return k === 'ArrowUp'    && sh && nocmd && !opt;
  if (s === 'SHIFT+ARROWDOWN')  return k === 'ArrowDown'  && sh && nocmd && !opt;

  // ── SHIFT + letter (e.g. SHIFT+A for Figma Auto Layout) ───────────────────
  if (s.startsWith('SHIFT+') && !s.includes('CMD') && !s.includes('OPTION')) {
    const exp = s.slice(6);
    return sh && !cmd && !opt && keyIs(exp);
  }

  // ── OPTION + arrow ─────────────────────────────────────────────────────────
  if (s === 'OPTION+ARROWLEFT')  return k === 'ArrowLeft'  && opt && nocmd && !sh;
  if (s === 'OPTION+ARROWRIGHT') return k === 'ArrowRight' && opt && nocmd && !sh;
  if (s === 'OPTION+ARROWUP')    return k === 'ArrowUp'    && opt && nocmd && !sh;
  if (s === 'OPTION+ARROWDOWN')  return k === 'ArrowDown'  && opt && nocmd && !sh;

  // ── OPTION + bracket ───────────────────────────────────────────────────────
  if (s === 'OPTION+[') return k === '[' && opt && nocmd && !sh;
  if (s === 'OPTION+]') return k === ']' && opt && nocmd && !sh;

  // ── OPTION + SHIFT + key ───────────────────────────────────────────────────
  if (s.startsWith('OPTION+SHIFT+')) {
    const exp = s.slice(13);
    return opt && sh && nocmd && keyIs(exp);
  }

  // ── CMD + SHIFT + OPTION + key ─────────────────────────────────────────────
  if (s.startsWith('CMD+SHIFT+OPTION+') || s.startsWith('CMD+OPTION+SHIFT+')) {
    const exp = s.startsWith('CMD+SHIFT+OPTION+') ? s.slice(17) : s.slice(17);
    return cmd && sh && opt && keyIs(exp);
  }

  // ── CMD + OPTION + key ─────────────────────────────────────────────────────
  if (s.startsWith('CMD+OPTION+')) {
    const exp = s.slice(11);
    return cmd && opt && !sh && keyIs(exp);
  }

  // ── CMD + SHIFT + key ──────────────────────────────────────────────────────
  if (s.startsWith('CMD+SHIFT+')) {
    const exp = s.slice(10);
    return cmd && sh && !opt && keyIs(exp);
  }

  // ── CMD + key ──────────────────────────────────────────────────────────────
  if (s.startsWith('CMD+')) {
    const exp = s.slice(4);
    return cmd && !sh && !opt && keyIs(exp);
  }

  // ── Bare single key ────────────────────────────────────────────────────────
  if (cmd || opt || sh) return false;
  return keyIs(s);
}

/* ══════════════════════════════════════
   APP SELECTOR
   All 5 options always rendered in fixed
   list order. max-height clips to one row
   (22px) when closed. Selected item stays
   in its natural position — the pill just
   reveals more of itself when opened.
   Non-selected rows fade out when closed.
══════════════════════════════════════ */
const APPS = [
  { key: 'Ps', label: 'Photoshop (Ps)',    short: 'Photoshop'    },
  { key: 'Ai', label: 'Illustrator (Ai)',  short: 'Illustrator'  },
  { key: 'In', label: 'InDesign (In)',     short: 'InDesign'     },
  { key: 'Ae', label: 'After Effects (Ae)',short: 'After Effects'},
  { key: 'Fi', label: 'Figma',             short: 'Figma'        },
];

// Each row is 22px. Closed: scroll to show selected row.
const ROW_H = 24; // px — must match CSS height: 24px on .app-option

let currentApp = (() => {
  try {
    const saved = localStorage.getItem('kw_app');
    if (saved && APPS.find(a => a.key === saved)) return saved;
  } catch(e) {}
  return 'Ps';
})();

const appPillEl = document.getElementById('appPill');

function buildAppPill() {
  appPillEl.innerHTML = '';
  APPS.forEach((app, idx) => {
    const row = document.createElement('div');
    row.className = 'app-option' + (app.key === currentApp ? ' selected' : '');
    row.dataset.key = app.key;
    // Caret only on selected row
    row.innerHTML = `<span class="app-caret">${app.key === currentApp ? '▶' : '  '}</span><span class="app-label">${app.label}</span>`;
    row.addEventListener('click', e => {
      e.stopPropagation();     // stop bubbling to pill's own onclick
      if (gameState === 'playing' || gameState === 'paused' || gameState === 'confirm-reset') return;
      currentApp = app.key;
      try { localStorage.setItem('kw_app', currentApp); } catch(e) {}
      buildAppPill();
      closeAppPill();
    });
    appPillEl.appendChild(row);
  });
  // Scroll pill so selected row is visible when closed
  scrollPillToSelected();
}

function scrollPillToSelected() {
  const idx = APPS.findIndex(a => a.key === currentApp);
  // scrollTop positions the selected row at the top of the 22px window
  appPillEl.scrollTop = idx * ROW_H;
}

function toggleAppDropdown() {
  if (gameState === 'playing' || gameState === 'paused' || gameState === 'confirm-reset') return;
  appPillEl.classList.contains('open') ? closeAppPill() : openAppPill();
}

function openAppPill() {
  appPillEl.classList.add('open');
  // Reset scroll so list shows from top when fully open
  appPillEl.scrollTop = 0;
}

function closeAppPill() {
  appPillEl.classList.remove('open');
  // After transition, scroll to selected row
  setTimeout(scrollPillToSelected, 230);
}

// Close on outside click
document.addEventListener('click', e => {
  if (!appPillEl.contains(e.target)) closeAppPill();
});

function setAppSelectorGameActive(active) {
  appPillEl.classList.toggle('game-active', active);
  if (active) closeAppPill();
}

// ── Debug overlay — Esc hold 2s to show, single Esc to hide ─────────────────
// ── Debug overlay — Esc hold 2s to show, single Esc to hide ─────────────────
let escHoldTimer = null;
let escHoldFired = false;

document.addEventListener('keydown', e => {
  if (e.key !== 'Escape' || e.repeat) return;
  if (document.getElementById('debugOverlay').style.display !== 'none') return;
  escHoldFired = false;
  escHoldTimer = setTimeout(() => {
    escHoldFired = true;

    document.getElementById('dbgKey').textContent = '';
    document.getElementById('dbgMatch').textContent = '';
  }, 2000);
});

document.addEventListener('keyup', e => {
  if (e.key !== 'Escape') return;

    escHoldFired = false;
    return;
  }
  const dbg = document.getElementById('debugOverlay');

});

// ── Debug navigation ──────────────────────────────────────────────────────
function dbgPrevQuestion() {

  currentAnswer = questionPool[questionIndex].shortcut;
  titleEl.className = '';
  titleEl.textContent = questionPool[questionIndex].display;

}
function dbgNextQuestion() {

  questionIndex = (questionIndex + 1) % questionPool.length;
  currentAnswer = questionPool[questionIndex].shortcut;

}
// Initialise
buildAppPill();


/* ══════════════════════════════════════
   POOL BUILDER
   Filters master SHORTCUTS list by the
   selected app and current OS mode.
══════════════════════════════════════ */
const APP_FIELD = {Ps:'ps', Ai:'ai', In:'indd', Ae:'ae', Fi:'fi'};

function buildPool() {
  const field = APP_FIELD[currentApp] || 'ps';
  return SHORTCUTS.filter(s => {
    if (!s[field]) return false;             // not in this app
    if (!s.pc_safe && currentOs === 'pc') return false;  // mac-only on PC
    return true;
  });
}
function startGame() {
  gameState = 'playing';
  setAppSelectorGameActive(true);
  totalTime = 0;
  transitioning = false;
  questionPool = shuffleArray(buildPool());
  questionIndex = 0;
  answersLeft = 10;
  currentAnswer = questionPool[0].shortcut;
  helpActive = false;

  mainBtn.textContent = 'Skip';
  mainBtn.style.background = '';
  helpBtn.textContent = 'Help';
  helpBtn.style.background = '';
  helpBtn.style.color = '';
  titleEl.className = '';
  titleEl.textContent = questionPool[0].display;
  questionCountEl.style.opacity = '1';
  questionCountEl.textContent = 'You have 10 questions to go.';
  resetTimerBox();
  clearAllLit();
  heldKeys.clear();
  greenHeld.clear();
  greenHits = 0;
  totalHits = 0;
  clearTimeout(accuracyPenaltyTimeout);
  timerBox.classList.remove('penalty-time', 'penalty-acc');
  updateAccuracyDisplay();
  if (lockKeyEl) lockKeyEl.classList.remove('active');

  clearInterval(timerInterval);
  clearTimeout(penaltyTimeout);
  timerInterval = setInterval(updateTimer, 100);
  document.addEventListener('keydown', handleKeydown);
  document.addEventListener('keyup',   handleKeyup);
}

function skipShortcut() {
  if (transitioning) return;
  transitioning = true;
  clearHelp();
  titleEl.classList.add('strike');
  clearInterval(timerInterval);
  timerBox.classList.add('penalty-time');
  timerDiv.textContent = '+5';

  penaltyTimeout = setTimeout(() => {
    timerBox.classList.remove('penalty-time');
    totalTime += 5;
    advanceQuestion();
    if (gameState === 'playing') {
      resetTimerBox();
      timerInterval = setInterval(updateTimer, 100);
    }
  }, 2000);
}

function advanceQuestion() {
  // Move to the next question in the pool, reshuffling if we reach the end
  questionIndex++;
  if (questionIndex >= questionPool.length) {
    questionPool = shuffleArray(buildPool());
    questionIndex = 0;
  }
  currentAnswer = questionPool[questionIndex].shortcut;
  titleEl.className = '';
  titleEl.textContent = questionPool[questionIndex].display;
  mainBtn.textContent = 'Skip';
  clearHelp();
  transitioning = false;
  clearAllLit();
  heldKeys.clear();
  questionCountEl.style.opacity = '1';
}

function recordAnswer() {
  // Called only on a correct keypress — decrements the answer counter
  answersLeft--;
  if (answersLeft <= 0) {
    endGame();
    return;
  }
  // Update count immediately, before the next question displays
  questionCountEl.textContent = answersLeft === 1 ? 'Last question:' : 'You have ' + answersLeft + ' questions to go.';
  advanceQuestion();
}

function endGameMessage(time, accuracy, record, wasFirst) {
  if (wasFirst) return 'I will keep track of your best performances.';
  const newBestTime = time <= record.time;
  const newBestAcc  = accuracy >= record.accuracy;
  const perfectAcc  = record.accuracy >= 100;
  if (newBestTime && newBestAcc) return 'Wow.\nNew records on both fronts!';
  if (newBestTime) return perfectAcc ? 'New time record!' : 'New time record! Can you raise the accuracy too?';
  if (newBestAcc)  return 'Best accuracy yet!\nNow push that time down.';
  if (time < record.time + 10 && accuracy > (record.accuracy ?? 0) - 5)
    return "So close. You've shown you can do better.";
  if (accuracy > (record.accuracy ?? 0))
    return 'Accuracy improving — keep the pace up.';
  if (time < record.time + 15)
    return "Try again — you're almost there.";
  return 'Keep practising. Every rep counts.';
}

function endGame() {
  gameState = 'finished';
  setAppSelectorGameActive(false);
  clearInterval(timerInterval);
  clearTimeout(penaltyTimeout);
  clearHelp();
  document.removeEventListener('keyup', handleKeyup);
  clearAllLit();
  heldKeys.clear();

  const finalAccuracy = calcAccuracy() ?? 0;
  const wasFirstRecord = bestRecord.time === null;
  let changed = false;
  if (bestRecord.time === null || totalTime < bestRecord.time) {
    bestRecord.time = totalTime; changed = true;
  }
  if (bestRecord.accuracy === null || finalAccuracy > bestRecord.accuracy) {
    bestRecord.accuracy = finalAccuracy; changed = true;
  }
  if (changed) {
    try { localStorage.setItem('kw_best', JSON.stringify(bestRecord)); } catch(e) {}
    updateBestDisplay();
  }

  mainBtn.textContent = 'Try again?';
  titleEl.className = '';
  titleEl.textContent = endGameMessage(totalTime, finalAccuracy, bestRecord, wasFirstRecord);
  questionCountEl.textContent = '';
  timerBox.className = 'timerBox finished';
  timerDiv.textContent = formatTime(Math.floor(totalTime));
}

function showTip(index) {
  tipIndex = ((index % IMPROVEMENT_TIPS.length) + IMPROVEMENT_TIPS.length) % IMPROVEMENT_TIPS.length;
  titleEl.textContent = IMPROVEMENT_TIPS[tipIndex];
}

function handleKeydown(e) {
  updateKeyboardLighting(e, true);
  // DEBUG
  const dbg = document.getElementById('debugOverlay');
  if (dbg && dbg.style.display !== 'none') {
    const needed = shortcutToCodes(currentAnswer);
    document.getElementById('dbgAnswer').textContent = 'answer: ' + currentAnswer;
    document.getElementById('dbgKey').textContent =
      'key=' + JSON.stringify(e.key) + ' code=' + e.code +
      ' cmd=' + (currentOs==='pc'?e.ctrlKey:e.metaKey) +
      ' sh=' + e.shiftKey + ' opt=' + e.altKey;
    document.getElementById('dbgMatch').textContent =
      'needed:' + needed.join(',') + ' | includes('+e.code+'):' + needed.includes(e.code) + ' | match:' + matchesShortcut(e, currentAnswer);
  }
  if (gameState === 'finished') {
    if (e.key === 'ArrowRight') { showTip(tipIndex + 1); e.preventDefault(); return; }
    if (e.key === 'ArrowLeft')  { showTip(tipIndex - 1); e.preventDefault(); return; }
  }
  if (gameState === 'paused' || gameState === 'confirm-reset') { e.preventDefault(); return; }
  if (gameState !== 'playing' || transitioning) { e.preventDefault(); return; }

  if (matchesShortcut(e, currentAnswer)) {
    transitioning = true;
      clearHelp();
    clearInterval(timerInterval);
    // Keys already lit green by updateKeyboardLighting — nothing extra needed
    setTimerState('green', 'right');
    titleEl.classList.add('hidden');
    // Fade out the question count immediately
    questionCountEl.style.opacity = '0';
    setTimeout(() => {
      clearAllLit();
      heldKeys.clear();
      recordAnswer();
      if (gameState === 'playing') {
        resetTimerBox();
        timerInterval = setInterval(updateTimer, 100);
      }
    }, 1500);
  } else {
    if (!timerBox.classList.contains('red') && !timerBox.classList.contains('green')) {
      setTimerState('red');
      setTimeout(() => {
        if (gameState === 'playing' && timerBox.classList.contains('red')) resetTimerBox();
      }, 800);
    }
  }
  e.preventDefault();
}

function handleKeyup(e) {
  updateKeyboardLighting(e, false);
}
</script>
